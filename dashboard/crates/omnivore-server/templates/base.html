<!DOCTYPE html>
<html lang="en">
<script>
(function(){var t=localStorage.getItem('omnivore-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Omnivore{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo"><span>Omnivore</span> Dashboard</a>
      <nav>
        <a href="/">Projects</a>
        <a href="/settings">Settings</a>
        <span id="user-menu"></span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
<script>
// Global keyboard shortcuts
document.addEventListener('keydown', function(e) {
  // Skip if user is typing in an input/textarea
  var tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
    if (e.key === 'Escape') { document.activeElement.blur(); }
    return;
  }
  // "/" focuses any search/filter input on the page
  if (e.key === '/') {
    var search = document.querySelector('.project-search') || document.querySelector('.file-search');
    if (search) { e.preventDefault(); search.focus(); }
  }
});

// Auth: user menu
(function(){
  var menu = document.getElementById('user-menu');
  fetch('/auth/me').then(function(r){ return r.json(); }).then(function(s){
    if (!s.oauth_enabled) return;
    if (s.logged_in) {
      var img = s.avatar_url ? '<img src="'+s.avatar_url+'&s=28" class="avatar" width="28" height="28" alt="">' : '';
      menu.innerHTML = img + '<span class="username">' + s.username + '</span>' +
        '<form method="post" action="/auth/logout" style="display:inline"><button type="submit" class="btn-link">Logout</button></form>';
    } else {
      menu.innerHTML = '<a href="/auth/login" class="login-link">Login</a>';
    }
  }).catch(function(){});
})();

(function(){
  var btn = document.getElementById('theme-toggle');
  function isDark() {
    var t = document.documentElement.getAttribute('data-theme');
    if (t === 'dark') return true;
    if (t === 'light') return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  function update() { btn.textContent = isDark() ? '\u2600\uFE0F' : '\uD83C\uDF19'; }
  btn.addEventListener('click', function() {
    var next = isDark() ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('omnivore-theme', next);
    update();
  });
  update();
})();
</script>
</body>
</html>
