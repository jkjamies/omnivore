name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        working-directory: coverage-plugin
        run: ./gradlew build

      # Publish agent to Maven Central (OSSRH)
      - name: Publish agent to Maven Central
        working-directory: coverage-plugin
        run: ./gradlew :omnivore-agent:publishMavenJavaPublicationToOSSRHRepository
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      # Publish Gradle plugin to Maven Central
      - name: Publish plugin to Maven Central
        working-directory: coverage-plugin
        run: ./gradlew :omnivore-gradle-plugin:publishAllPublicationsToOSSRHRepository
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      # Publish to Gradle Plugin Portal
      - name: Publish to Gradle Plugin Portal
        working-directory: coverage-plugin
        run: ./gradlew :omnivore-gradle-plugin:publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
